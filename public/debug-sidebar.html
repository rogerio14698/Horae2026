<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Debug Sidebar Toggle</title>
    <link rel="stylesheet" href="/vendor/adminlte/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="/vendor/fontawesome-free/css/all.min.css">
    <style>
        .debug-panel {
            position: fixed;
            top: 60px;
            right: 10px;
            background: #fff;
            border: 2px solid #007bff;
            padding: 15px;
            border-radius: 5px;
            z-index: 9999;
            max-width: 400px;
        }
        .debug-panel h3 {
            margin-top: 0;
            font-size: 14px;
        }
        .debug-panel pre {
            font-size: 11px;
            background: #f4f4f4;
            padding: 5px;
            overflow-x: auto;
        }
        .test-button {
            margin: 5px 0;
            display: block;
        }
    </style>
</head>
<body class="sidebar-mini text-sm">

<div class="wrapper">
    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                    <i class="fas fa-bars"></i>
                </a>
            </li>
        </ul>
        <span style="margin-left: 20px; font-weight: bold;">DEBUG: Prueba Sidebar Toggle</span>
    </nav>

    <!-- Main Sidebar Container -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <!-- Brand Logo -->
        <a href="#" class="brand-link">
            <span class="brand-text font-weight-light">AdminLTE 3</span>
        </a>

        <!-- Sidebar -->
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column">
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-user"></i>
                            <p>Usuarios</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-cog"></i>
                            <p>Configuración</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1>Prueba de Sidebar Toggle</h1>
            </div>
        </div>
        <div class="content">
            <div class="container-fluid">
                <p>Haz clic en el botón de hamburguesa para probar el colapso del sidebar.</p>
            </div>
        </div>
    </div>
</div>

<!-- Debug Panel -->
<div class="debug-panel">
    <h3>🔍 Panel de Diagnóstico</h3>
    
    <button class="btn btn-sm btn-primary test-button" onclick="testJQuery()">
        ✓ Probar jQuery
    </button>
    
    <button class="btn btn-sm btn-info test-button" onclick="testPushMenu()">
        ✓ Probar PushMenu
    </button>
    
    <button class="btn btn-sm btn-warning test-button" onclick="testToggle()">
        🔄 Toggle Manual
    </button>
    
    <button class="btn btn-sm btn-success test-button" onclick="checkBodyClasses()">
        📋 Ver Body Classes
    </button>
    
    <button class="btn btn-sm btn-danger test-button" onclick="checkErrors()">
        ⚠️ Ver Errores Console
    </button>
    
    <div id="debug-output"></div>
</div>

<!-- Scripts -->
<script src="/vendor/jquery/jquery.min.js"></script>
<script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/vendor/adminlte/dist/js/adminlte.min.js"></script>

<script>
    var consoleErrors = [];
    
    // Capturar errores de consola
    var originalError = console.error;
    console.error = function() {
        consoleErrors.push(Array.from(arguments).join(' '));
        originalError.apply(console, arguments);
    };
    
    function showOutput(title, content) {
        var output = document.getElementById('debug-output');
        output.innerHTML = '<h4 style="font-size:12px; margin-top:10px;">' + title + '</h4><pre>' + content + '</pre>';
    }
    
    function testJQuery() {
        try {
            var version = $.fn.jquery;
            var elementCount = $('[data-widget="pushmenu"]').length;
            showOutput('jQuery Test', 
                'jQuery Version: ' + version + '\n' +
                'Elementos pushmenu: ' + elementCount + '\n' +
                '✓ jQuery funciona correctamente'
            );
        } catch(e) {
            showOutput('jQuery Test', '❌ ERROR: ' + e.message);
        }
    }
    
    function testPushMenu() {
        try {
            var $btn = $('[data-widget="pushmenu"]').first();
            var hasPushMenu = typeof $.fn.PushMenu === 'function';
            var hasData = typeof $btn.data('lte.pushmenu') !== 'undefined';
            
            showOutput('PushMenu Test',
                '$.fn.PushMenu existe: ' + (hasPushMenu ? '✓ SI' : '❌ NO') + '\n' +
                'Botón tiene data: ' + (hasData ? '✓ SI' : '❌ NO') + '\n' +
                'Data actual: ' + JSON.stringify($btn.data(), null, 2)
            );
        } catch(e) {
            showOutput('PushMenu Test', '❌ ERROR: ' + e.message);
        }
    }
    
    function testToggle() {
        try {
            $('[data-widget="pushmenu"]').first().trigger('click');
            showOutput('Toggle Manual', '✓ Click trigger ejecutado');
        } catch(e) {
            showOutput('Toggle Manual', '❌ ERROR: ' + e.message);
        }
    }
    
    function checkBodyClasses() {
        var classes = document.body.className;
        var hasSidebarMini = classes.includes('sidebar-mini');
        var hasSidebarCollapse = classes.includes('sidebar-collapse');
        var hasSidebarOpen = classes.includes('sidebar-open');
        
        showOutput('Body Classes',
            'Classes actuales:\n' + classes + '\n\n' +
            'sidebar-mini: ' + (hasSidebarMini ? '✓ SI' : '❌ NO') + '\n' +
            'sidebar-collapse: ' + (hasSidebarCollapse ? '✓ SI' : '❌ NO') + '\n' +
            'sidebar-open: ' + (hasSidebarOpen ? '✓ SI' : '❌ NO')
        );
    }
    
    function checkErrors() {
        if (consoleErrors.length === 0) {
            showOutput('Errores Console', '✓ No hay errores registrados');
        } else {
            showOutput('Errores Console', consoleErrors.join('\n\n'));
        }
    }
    
    // Inicializar PushMenu
    $(document).ready(function() {
        console.log('Document ready - Inicializando PushMenu...');
        
        $('[data-widget="pushmenu"]').each(function() {
            var $this = $(this);
            console.log('Elemento pushmenu encontrado:', $this);
            
            if (!$this.data('lte.pushmenu')) {
                console.log('Inicializando PushMenu widget...');
                try {
                    $this.PushMenu();
                    console.log('✓ PushMenu inicializado correctamente');
                } catch(e) {
                    console.error('❌ Error al inicializar PushMenu:', e);
                }
            } else {
                console.log('PushMenu ya estaba inicializado');
            }
        });
        
        console.log('Body classes:', document.body.className);
    });
    
    // Mostrar mensaje inicial
    setTimeout(function() {
        testJQuery();
    }, 500);
</script>

</body>
</html>
